name: Sync knowledge base

on:
  schedule:
    # Every 4 hours — catches new social posts within 4 hours of publishing
    - cron: '0 */4 * * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # ── Python (for Twitter sync via twscrape) ───────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements-social.txt

      # Cache twscrape session so we stay logged in between runs
      - name: Restore twscrape session
        uses: actions/cache@v4
        with:
          path: accounts.db
          key: twscrape-session-${{ runner.os }}
          restore-keys: twscrape-session-

      # ── Sync Twitter/X posts ─────────────────────────────────────────────
      - name: Sync Twitter/X posts
        run: python scripts/sync-twitter.py
        env:
          TWITTER_PHANEROO_USERNAME: ${{ secrets.TWITTER_PHANEROO_USERNAME }}
          TWITTER_SCRAPER_USERNAME: ${{ secrets.TWITTER_SCRAPER_USERNAME }}
          TWITTER_SCRAPER_PASSWORD: ${{ secrets.TWITTER_SCRAPER_PASSWORD }}
          TWITTER_SCRAPER_EMAIL: ${{ secrets.TWITTER_SCRAPER_EMAIL }}
          TWITTER_SCRAPER_EMAIL_PASSWORD: ${{ secrets.TWITTER_SCRAPER_EMAIL_PASSWORD }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Sync Facebook posts ──────────────────────────────────────────────
      - name: Sync Facebook posts
        run: npm run sync-social
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Ingest new devotions from phaneroo.org ───────────────────────────
      - name: Ingest latest devotions
        run: npm run ingest-devotions
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Ingest sermons, testimonials, prophetic words ────────────────────
      - name: Ingest teachings and testimonials
        run: npm run ingest-teachings
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Sync YouTube sermons (titles + latest 5 transcripts) ─────────────
      - name: Sync YouTube sermons
        run: python scripts/sync-youtube.py
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Verify the sync completed successfully ───────────────────────────
      - name: Verify sync health
        run: npm run verify-sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
