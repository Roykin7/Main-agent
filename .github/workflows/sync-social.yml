name: Sync social posts

on:
  schedule:
    # 6 AM Uganda time (UTC+3) = 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Node.js (for Facebook sync via TypeScript) ──────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # ── Python (for Twitter sync via twscrape) ───────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements-social.txt

      # Cache the twscrape accounts.db so we stay logged in between runs
      # (re-logging every run can trigger Twitter's bot detection)
      - name: Restore twscrape session
        uses: actions/cache@v4
        with:
          path: accounts.db
          key: twscrape-session-${{ runner.os }}
          restore-keys: twscrape-session-

      # ── Run syncs ────────────────────────────────────────────────────────
      - name: Sync Twitter/X posts
        run: python scripts/sync-twitter.py
        env:
          TWITTER_PHANEROO_USERNAME: ${{ secrets.TWITTER_PHANEROO_USERNAME }}
          TWITTER_SCRAPER_USERNAME: ${{ secrets.TWITTER_SCRAPER_USERNAME }}
          TWITTER_SCRAPER_PASSWORD: ${{ secrets.TWITTER_SCRAPER_PASSWORD }}
          TWITTER_SCRAPER_EMAIL: ${{ secrets.TWITTER_SCRAPER_EMAIL }}
          TWITTER_SCRAPER_EMAIL_PASSWORD: ${{ secrets.TWITTER_SCRAPER_EMAIL_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync Facebook posts
        run: npm run sync-social
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
